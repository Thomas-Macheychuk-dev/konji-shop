services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: konji-shop-app:local
    pull_policy: never
    user: "1000:1000"
    container_name: konji_shop_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - mailpit
    volumes:
      - ./:/var/www/html
    networks:
      - konji

  web:
    image: nginx:1.27-alpine
    container_name: konji_shop_web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - konji

  queue:
    image: konji-shop-app:local
    pull_policy: never
    user: "1000:1000"
    container_name: konji_shop_queue
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
      - db
      - redis
      - mailpit
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    networks:
      - konji

  scheduler:
    image: konji-shop-app:local
    pull_policy: never
    user: "1000:1000"
    container_name: konji_shop_scheduler
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - app
      - db
      - redis
      - mailpit
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    networks:
      - konji

  db:
    image: mysql:8.4
    container_name: konji_shop_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-konji_shop}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-konji}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
        - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - konji

  redis:
    image: redis:7-alpine
    container_name: konji_shop_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - konji

  mailpit:
    image: axllent/mailpit:latest
    container_name: konji_shop_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - konji

volumes:
  mysql_data:
  redis_data:

networks:
  konji:
    driver: bridge
